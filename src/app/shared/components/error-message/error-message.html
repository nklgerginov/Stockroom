<div class="rounded-2xl border border-red-200 bg-red-50 p-6 text-center">
  <p class="text-sm font-medium text-red-700">{{ message }}</p>
  @if (showRetry) {
    <button
      type="button"
      (click)="retry.emit()"
      class="mt-4 rounded-lg bg-red-600 px-4 py-2 text-sm font-semibold text-white transition hover:bg-red-700"
    >
      Try again
    </button>
  }
</div>
