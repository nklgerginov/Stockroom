<article
  class="group flex h-full flex-col overflow-hidden rounded-2xl border border-stone-200 bg-white shadow-sm transition hover:-translate-y-0.5 hover:shadow-md"
>
  <a [routerLink]="['/products', product.id]" class="relative block aspect-square overflow-hidden bg-stone-100 p-6">
    <img
      [src]="product.image"
      [alt]="product.title"
      class="h-full w-full object-contain transition duration-300 group-hover:scale-105"
      loading="lazy"
    />
  </a>

  <div class="flex flex-1 flex-col gap-3 p-4">
    <div class="flex items-start justify-between gap-2">
      <span
        class="rounded-full bg-brand-50 px-2.5 py-0.5 text-xs font-medium capitalize text-brand-700"
      >
        {{ product.category }}
      </span>
      <div class="flex items-center gap-1 text-xs text-stone-500">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-3.5 w-3.5 text-amber-400" viewBox="0 0 20 20" fill="currentColor">
          <path
            d="M9.049 2.927c.3-.921 1.603-.921 1.902 0l1.07 3.292a1 1 0 0 0 .95.69h3.462c.969 0 1.371 1.24.588 1.81l-2.8 2.034a1 1 0 0 0-.364 1.118l1.07 3.292c.3.921-.755 1.688-1.54 1.118l-2.8-2.034a1 1 0 0 0-1.175 0l-2.8 2.034c-.784.57-1.838-.197-1.539-1.118l1.07-3.292a1 1 0 0 0-.364-1.118L2.98 8.72c-.783-.57-.38-1.81.588-1.81h3.461a1 1 0 0 0 .951-.69l1.07-3.292Z"
          />
        </svg>
        {{ product.rating.rate }}
      </div>
    </div>

    <a [routerLink]="['/products', product.id]" class="line-clamp-2 text-sm font-semibold text-stone-900 hover:text-brand-600">
      {{ product.title }}
    </a>

    <div class="mt-auto flex items-center justify-between gap-2">
      <p class="text-lg font-bold text-stone-900">{{ product.price | currency }}</p>
      <button
        type="button"
        (click)="onAddToCart($event)"
        class="rounded-lg bg-brand-600 px-3 py-2 text-xs font-semibold text-white transition hover:bg-brand-700 active:scale-95"
      >
        Add to cart
      </button>
    </div>
  </div>
</article>
