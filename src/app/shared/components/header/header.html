<header class="sticky top-0 z-50 border-b border-stone-200 bg-white/90 backdrop-blur-md">
  <div class="mx-auto flex max-w-7xl items-center justify-between gap-4 px-4 py-4 sm:px-6 lg:px-8">
    <a routerLink="/catalog" class="group flex items-center gap-2">
      <span
        class="flex h-9 w-9 items-center justify-center rounded-lg bg-brand-600 text-sm font-bold text-white shadow-sm transition group-hover:bg-brand-700"
      >
        S
      </span>
      <div>
        <p class="text-lg font-bold tracking-tight text-stone-900">Stockroom</p>
        <p class="hidden text-xs text-stone-500 sm:block">Product catalog</p>
      </div>
    </a>

    <nav class="flex items-center gap-2 sm:gap-4">
      <a
        routerLink="/catalog"
        routerLinkActive="text-brand-600"
        [routerLinkActiveOptions]="{ exact: true }"
        class="rounded-lg px-3 py-2 text-sm font-medium text-stone-600 transition hover:bg-stone-100 hover:text-stone-900"
      >
        Shop
      </a>

      <a
        routerLink="/cart"
        routerLinkActive="text-brand-600"
        class="relative flex items-center gap-2 rounded-lg px-3 py-2 text-sm font-medium text-stone-600 transition hover:bg-stone-100 hover:text-stone-900"
      >
        <svg
          xmlns="http://www.w3.org/2000/svg"
          class="h-5 w-5"
          fill="none"
          viewBox="0 0 24 24"
          stroke="currentColor"
          stroke-width="1.5"
        >
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            d="M2.25 3h1.386c.51 0 .955.343 1.087.835l.383 1.437M7.5 14.25a3 3 0 0 0-3 3h15.75m-12.75-3h11.218c1.121-2.3 2.1-4.684 2.924-7.138a60.114 60.114 0 0 0-16.536-1.84M7.5 14.25 5.106 5.272M6 20.25a.75.75 0 1 1-1.5 0 .75.75 0 0 1 1.5 0Zm12.75 0a.75.75 0 1 1-1.5 0 .75.75 0 0 1 1.5 0Z"
          />
        </svg>
        <span class="hidden sm:inline">Cart</span>
        @if (itemCount() > 0) {
          <span
            class="absolute -right-1 -top-1 flex h-5 min-w-5 items-center justify-center rounded-full bg-brand-600 px-1 text-xs font-semibold text-white"
          >
            {{ itemCount() }}
          </span>
        }
      </a>
    </nav>
  </div>
</header>
